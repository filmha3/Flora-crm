<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>Flora CRM</title>

    <!-- Makes it behave like an installed app when added to the iPhone home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flora CRM" />
    <meta name="theme-color" content="#3B82F6" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Replace with your own 180x180 png for a custom home-screen icon -->
    <link rel="apple-touch-icon" href="/icon-180.png" />

    <style>
      #flora-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #070B14;
        animation: floraSplashFadeOut 0.35s ease-in 1.1s forwards;
      }
      #flora-splash .logo-wrap {
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        animation: floraSplashAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #flora-splash svg { animation: floraSplashPulse 1.2s ease-in-out infinite; }
      #flora-splash .name {
        font-family: 'Vazirmatn', sans-serif;
        font-size: 24px; font-weight: 800; color: #3B82F6; letter-spacing: 1px;
        opacity: 0; animation: floraSplashSlide 0.5s ease 0.3s forwards;
      }
      @keyframes floraSplashAppear { from { opacity: 0; transform: scale(0.5);} to { opacity: 1; transform: scale(1);} }
      @keyframes floraSplashPulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.08);} }
      @keyframes floraSplashSlide { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
      @keyframes floraSplashFadeOut { from { opacity: 1;} to { opacity: 0; visibility: hidden;} }
    </style>
  </head>
  <body>
    <div id="flora-splash">
      <div class="logo-wrap">
        <svg width="64" height="64" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" fill="#3B82F6" />
          <path d="M50 25 C40 35 40 50 50 60 C60 50 60 35 50 25 Z" fill="white" />
          <path d="M50 60 C35 55 25 60 20 75 C35 80 48 75 50 60 Z" fill="white" opacity="0.9" />
          <path d="M50 60 C65 55 75 60 80 75 C65 80 52 75 50 60 Z" fill="white" opacity="0.9" />
        </svg>
        <span class="name">Flora CRM</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
