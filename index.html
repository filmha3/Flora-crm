<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>Flora CRM</title>

    <!-- Makes it behave like an installed app when added to the iPhone home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flora CRM" />
    <meta name="theme-color" content="#0A0E1A" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <meta name="application-name" content="Flora CRM" />
    <meta name="description" content="مدیریت فایل‌های ملکی، مشتریان و حساب‌کتاب دفتر املاک" />

    <style>
      #flora-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0A0E1A;
        animation: floraSplashFadeOut 0.35s ease-in 1.1s forwards;
      }
      #flora-splash .logo-wrap {
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        animation: floraSplashAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #flora-splash svg { animation: floraSplashPulse 1.2s ease-in-out infinite; }
      #flora-splash .name {
        font-family: 'Vazirmatn', sans-serif;
        font-size: 24px; font-weight: 800; color: #3B82F6; letter-spacing: 1px;
        opacity: 0; animation: floraSplashSlide 0.5s ease 0.3s forwards;
      }
      @keyframes floraSplashAppear { from { opacity: 0; transform: scale(0.5);} to { opacity: 1; transform: scale(1);} }
      @keyframes floraSplashPulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.08);} }
      @keyframes floraSplashSlide { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
      @keyframes floraSplashFadeOut { from { opacity: 1;} to { opacity: 0; visibility: hidden;} }
    </style>
  </head>
  <body>
    <div id="flora-splash">
      <div class="logo-wrap">
        <svg width="76" height="76" viewBox="0 0 64 64" fill="none" stroke="#5b9dff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M32 6 L54 22 L54 56 L10 56 L10 22 Z" />
          <circle cx="32" cy="24" r="3.4" fill="#BA9358" stroke="#BA9358" />
          <path d="M32 27 L32 48" />
          <path d="M32 35 C26 32 22 34 20 40 M32 35 C38 32 42 34 44 40 M32 42 C27 40 24 42 22 47 M32 42 C37 40 40 42 42 47" stroke="#BA9358" stroke-width="1.6" />
        </svg>
        <span class="name">Flora CRM</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
