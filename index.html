<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>Flora CRM</title>

    <!-- Makes it behave like an installed app when added to the iPhone home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flora CRM" />
    <meta name="theme-color" content="#0A0E1A" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <meta name="application-name" content="Flora CRM" />
    <meta name="description" content="مدیریت فایل‌های ملکی، مشتریان و حساب‌کتاب دفتر املاک" />

    <style>
      #flora-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0A0E1A;
        animation: floraSplashFadeOut 0.35s ease-in 1.1s forwards;
      }
      #flora-splash .logo-wrap {
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        animation: floraSplashAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #flora-splash svg { animation: floraSplashPulse 1.2s ease-in-out infinite; }
      #flora-splash .name {
        font-family: 'Vazirmatn', sans-serif;
        font-size: 24px; font-weight: 800; color: #3B82F6; letter-spacing: 1px;
        opacity: 0; animation: floraSplashSlide 0.5s ease 0.3s forwards;
      }
      @keyframes floraSplashAppear { from { opacity: 0; transform: scale(0.5);} to { opacity: 1; transform: scale(1);} }
      @keyframes floraSplashPulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.08);} }
      @keyframes floraSplashSlide { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
      @keyframes floraSplashFadeOut { from { opacity: 1;} to { opacity: 0; visibility: hidden;} }
    </style>
  </head>
  <body>
    <div id="flora-splash">
      <div class="logo-wrap">
        <svg width="76" height="76" viewBox="0 0 64 64" fill="none">
          <path d="M16 32 A12 12 0 0 1 40 32 L40 55 L16 55 Z" fill="#c8a36e" fill-opacity="0.9" />
          <path d="M16 32 A12 12 0 0 1 40 32 L40 55 L16 55 Z" stroke="#E0E0DF" stroke-width="1.8" stroke-linejoin="round" fill="none" />
          <path d="M28 21 L28 55 M16 43 L40 43" stroke="#E0E0DF" stroke-width="1.8" stroke-linecap="round" />
          <path d="M50 18 L50 43" stroke="#c8a36e" stroke-width="2.3" stroke-linecap="round" />
          <path d="M50 36 L54 36 M50 40 L53 40" stroke="#c8a36e" stroke-width="1.8" stroke-linecap="round" />
          <circle cx="50" cy="49.5" r="6.5" stroke="#c8a36e" stroke-width="2" fill="none" />
          <path d="M47 49.6 L49 52 L52.5 47.6" stroke="#c8a36e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </svg>
        <span class="name">Flora CRM</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
